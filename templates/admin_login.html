{% extends "base.html" %}
{% block title %}Admin Login — VoteSecure{% endblock %}
{% block content %}
<div class="container-sm" style="max-width:380px;">
  <div class="mb-3">
    <p class="page-title">Admin Access</p>
    <p class="page-sub">Election Commission Portal</p>
  </div>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" placeholder="admin" required autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Access Admin Panel →</button>
    </form>
    <p style="text-align:center;margin-top:14px;font-size:0.78rem;color:var(--muted);">Default: admin / admin123</p>
  </div>
</div>
{% endblock %}
